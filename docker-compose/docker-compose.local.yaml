services:
  db:
    image: "postgres:16"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=achiery
      - POSTGRES_USER=achiery
      - POSTGRES_PASSWORD=achiery
    volumes:
      - ./db-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U achiery -d achiery" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: 50m
        max-file: "3"